<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier Models</title>
    <link rel="stylesheet" href="Style.css">
    <script src="index.js" defer></script>

</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="nav-container">
            <div class="logo">Premier</div>
            <nav>
                <ul>
                    <li>Models</li>
                    <li>Women / Men</li>
                    <li>Agency / Blog</li>
                    <li>Search</li>
                    
                </ul>
            </nav>
            <!-- Dark Mode Toggle Button -->
        <button id="dark-mode-toggle">Toggle Dark Mode</button>
    </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-text">
            <h1>Photography and Films</h1>
        </div>
    </section>

    <!-- Horizontal Scroll Section -->
    <section class="profiles">
        <div class="profiles">
            <button class="arrow left" onclick="moveLeft()">&#8249;</button>
            <div class="profile-list">
                <img src="./Premier-Asset/img (1).jpg" alt="Profile 1">
                <img src="./Premier-Asset/img (2).jpg" alt="Profile 2">
                <img src="./Premier-Asset/img (3).jpg" alt="Profile 3">
                <img src="./Premier-Asset/img (4).jpg" alt="Profile 4">
                <img src="./Premier-Asset/img (5).jpg" alt="Profile 5">
                <img src="./Premier-Asset/img (6).jpg" alt="Profile 6">
                <img src="./Premier-Asset/img (14).jpg" alt="Profile 7">
                <img src="./Premier-Asset/img (8).jpg" alt="Profile 8">
                <img src="./Premier-Asset/img (9).jpg" alt="Profile 9">
                <img src="./Premier-Asset/img (11).jpg" alt="Profile 10">
                <img src="./Premier-Asset/img (12).jpg" alt="Profile 11">
                <img src="./Premier-Asset/img (13).jpg" alt="Profile 12">
                <img src="./Premier-Asset/img (1).jpg" alt="Profile 1">
                <img src="./Premier-Asset/img (2).jpg" alt="Profile 2">
                <img src="./Premier-Asset/img (3).jpg" alt="Profile 3">
                <img src="./Premier-Asset/img (4).jpg" alt="Profile 4">
                <img src="./Premier-Asset/img (5).jpg" alt="Profile 5">
                <img src="./Premier-Asset/img (6).jpg" alt="Profile 6">
                <img src="./Premier-Asset/img (14).jpg" alt="Profile 7">
                <img src="./Premier-Asset/img (8).jpg" alt="Profile 8">
                <img src="./Premier-Asset/img (9).jpg" alt="Profile 9">
                <img src="./Premier-Asset/img (11).jpg" alt="Profile 10">
                <img src="./Premier-Asset/img (12).jpg" alt="Profile 11">
                <img src="./Premier-Asset/img (13).jpg" alt="Profile 12">
            </div>
            <button class="arrow right" onclick="moveRight()">&#8250;</button>
        </div>
    </section>

    <!-- Content Grid -->
    <section class="content-grid">
        <div class="content-box1">
            <img src="./Premier-Asset/img (5).jpg" alt="Fashion">
            <p>VOGUE/SHOT</p>
        </div>
        <div class="content-box2">
            <img src="./Premier-Asset/img (6).jpg" alt="Editorial">
            <p>Editorial</p>
        </div>
    </section>

    <!-- Updates Section -->
    <section class="updates">
        <h2>Updates</h2>
        <ul>
            <li>Khadim & Tom Ford</li>
            <li>Jing for Wonderland</li>
            <li>Glass x Belle</li>
        </ul>
    </section>

    <!-- Movie Shot Section -->
    <section class="movie-shot">
        <div class="movie-content">
            <img src="./Premier-Asset/img (7).jpg" alt="Movie">
            <img src="./Premier-Asset/img (8).jpg" alt="Movie">
        </div>
    </section>

    <!-- Blog Section -->
    <section class="blog">
        <h2>Blog</h2>
        <p>Jack Thompson features in a new story for ID Magazine.</p>
    </section>

    <!-- Footer -->
    <footer>
        <p>Premier Models &copy; 2025</p>
    </footer>

</body>
</html>

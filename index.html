<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier Models</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="nav-container">
            <div class="logo">Premier</div>
            <nav>
                <ul>
                    <li>Models</li>
                    <li>Women / Men</li>
                    <li>Agency / Blog</li>
                    <li>Search</li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-text">
            <h1>Photography and Films</h1>
        </div>
    </section>

    <!-- Horizontal Scroll Section -->
    <section class="profiles">
        <div class="profile-list">
            <img src="./Premier-Asset/img (1).jpg" alt="Profile">
            <img src="./Premier-Asset/img (2).jpg" alt="Profile">
            <img src="./Premier-Asset/img (3).jpg" alt="Profile">
            <img src="./Premier-Asset/img (4).jpg" alt="Profile">
            <!-- Add more images -->
        </div>
    </section>

    <!-- Content Grid -->
    <section class="content-grid">
        <div class="content-box">
            <img src="./Premier-Asset/img (5).jpg" alt="Fashion">
            <p>Fashion Story</p>
        </div>
        <div class="content-box">
            <img src="./Premier-Asset/img (6).jpg" alt="Editorial">
            <p>Editorial</p>
        </div>
    </section>

    <!-- Updates Section -->
    <section class="updates">
        <h2>Updates</h2>
        <ul>
            <li>Khadim & Tom Ford</li>
            <li>Jing for Wonderland</li>
            <li>Glass x Belle</li>
        </ul>
    </section>

    <!-- Movie Shot Section -->
    <section class="movie-shot">
        <div class="movie-content">
            <img src="./Premier-Asset/img (7).jpg" alt="Movie">
            <img src="./Premier-Asset/img (8).jpg" alt="Movie">
        </div>
    </section>

    <!-- Blog Section -->
    <section class="blog">
        <h2>Blog</h2>
        <p>Jack Thompson features in a new story for ID Magazine.</p>
    </section>

    <!-- Footer -->
    <footer>
        <p>Premier Models &copy; 2025</p>
    </footer>

</body>
</html>
